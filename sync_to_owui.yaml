apiVersion: batch/v1
kind: CronJob
metadata:
  name: skill-sync
  namespace: open-webui
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: python:3.12-alpine
              command:
                - sh
                - -c
                - |
                  pip install psycopg2-binary --quiet && \
                  SKILLS_FLAT_DIR=/skills python /skills/sync_to_owui.py
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: owui-postgres-pguser-owui
                      key: pgbouncer-uri
              volumeMounts:
                - name: skills
                  mountPath: /skills
          volumes:
            - name: skills
              configMap:
                name: owui-skills
