name: Rebuild owui-skills ConfigMap

# Trigger: any push to main that touches a skill file, the build script,
# or the sync script. Regenerates owui-skills-cm.yaml and commits the
# result back to main so ArgoCD applies the new ConfigMap and the
# skill-sync CronJob picks it up on its next hourly run.
#
# Loop guard: the bot's own commit is filtered out via actor + skipped
# from re-firing via [skip ci] in the commit message.
#
# Closes the dvystrcil/skills push-to-sync gap surfaced in the
# 2026-05-15 live-test session.

on:
  push:
    branches: [main]
    paths:
      - "owui/**/SKILL.md"
      - "build_configmap.py"
      - "sync_to_owui.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate ConfigMap
        run: python3 build_configmap.py

      - name: Diff
        id: diff
        run: |
          if git diff --quiet owui-skills-cm.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ConfigMap already up to date — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "ConfigMap regenerated; diff follows:"
            git --no-pager diff --stat owui-skills-cm.yaml
          fi

      - name: Commit + push regenerated ConfigMap
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add owui-skills-cm.yaml
          git commit -m "chore(owui-skills): regenerate ConfigMap [skip ci]"
          git push
