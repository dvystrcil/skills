  git-workflow.md: |
    ---
    name: "GitHub Workflow"
    description: "Enforces a strict GitOps workflow: branch, rebase, test, PR. Never merge self."
    tags: ["git", "github", "pr", "workflow"]
    scope: "complex"
    ---
    
    # GitHub Workflow
    
    ## Strict Git Rules
    1. **Never commit to main**: Always create a descriptive branch (`feature/...` or `fix/...`)
    2. **Rebase before committing**: Sync with main to avoid conflicts
    3. **Test before committing**: Verify code works. Include test files if applicable.
    4. **Commit with clear message**: Then push the branch
    5. **Always create a PR** with:
       - What was built/changed and why
       - How to test it
       - Dependencies/configuration notes
       - Known limitations or follow-up work
    6. **Never merge your own PR**: Await user review and approval

  homelab-image-updater.md: |
    ---
    name: "Homelab Image Updater"
    description: "How the homelab uses argocd-image-updater. Use whenever creating, editing, or debugging an ImageUpdater CRD. Covers two writer types, constraint mechanics, schema gotchas, and a registry of working examples."
    tags: ["homelab", "kubernetes", "argocd", "image-updater", "gitops"]
    scope: "complex"
    ---
    
    # Homelab Image Updater
    
    CRD-based config in `dvystrcil/argocd-image-updater/<app>/`. Before writing or editing one, **find a working example in the cluster**:
    
    ```bash
    kubectl -n argocd get imageupdater                            # list all
    kubectl -n argocd get imageupdater <similar-app>-iu -o yaml   # copy structure
    ```
    
    ## Two writer types
    
    **Kustomize** (most common, ~9 of 11 live CRDs) — for apps with `base/` + `overlays/kustomization.yaml`. NO `manifestTargets` needed.
    
    ```yaml
    imageName: "<registry>/<image>:<semver-constraint>"
    writeBackConfig:
      method: "git"
      gitConfig:
        repository: "https://github.com/dvystrcil/<repo>.git"
        branch: "main"
        writeBackTarget: "kustomization:/overlays"
    ```
    
    Reference: `trilium-iu`, `homepage-iu`, `n8n-workflow-iu`.
    
    **Helm** — for apps with a Helm chart. `manifestTargets.helm.{name,tag}` are dot-paths INTO values.yaml.
    
    ```yaml
    imageName: "<registry>/<image>:<semver-constraint>"
    manifestTargets:
      helm:
        name: "image.repository"
        tag: "image.tag"
    writeBackConfig:
      gitConfig:
        writeBackTarget: "helmvalues:./values.yaml"
    ```
    
    Reference: `cloudflared-iu`, `coder-iu`.
    
    **`manifestTargets.kubernetes` is NOT a thing** — there's no writer that takes raw `spec.template.spec.containers[].image` paths. Use kustomize instead.
    
    ## Constraint mechanics
    
    | Where | Purpose |
    |---|---|
    | `imageName: <image>:1.x` | Semver range constraint |
    | `commonUpdateSettings.allowTags: 'regexp:...'` | Tag regex filter (channel/build filter) |
    | `commonUpdateSettings.updateStrategy: semver/name/digest/newest-build` | How to pick from candidates |
    
    **Pre-release gotcha:** `imageName: ...:1.x-stable` does NOT filter the stable channel. Semver treats `-stable` as a pre-release identifier; `1.4.1-beta-slim > 1.3-stable` because the numeric portion wins. Channel filtering MUST go through `allowTags` regex.
    
    ## Schema silent-drop gotcha
    
    The CRD schema accepts ONLY these top-level keys in `images[]`:
    - `alias` (required)
    - `imageName` (required)
    - `commonUpdateSettings` (object)
    - `manifestTargets` (object, helm only)
    
    These belong UNDER `commonUpdateSettings` — at top level they get silently dropped:
    - `updateStrategy`, `allowTags`, `ignoreTags`, `forceUpdate`, `platforms`, `pullSecret`
    
    **Always verify after apply:**
    ```bash
    kubectl -n argocd get imageupdater <app>-iu -o yaml | grep -A6 'commonUpdateSettings:'
    ```
    
    ## Private registries (Harbor)
    
    ```yaml
    commonUpdateSettings:
      pullSecret: "pullsecret:<namespace>/harbor-pull"
    ```
    
    The harbor-pull secret is sourced via InfisicalSecret — see the `homelab-secrets` skill.
    
    ## Working examples
    
    | Pattern | Copy from |
    |---|---|
    | Plain kustomize semver | `trilium-iu` |
    | Helm with values.yaml | `cloudflared-iu` |
    | Channel filter via regex | `filebrowser-iu` (stable-only) |
    | Harbor private + regex tag | `ollama-iu` |
    | Harbor private + plain semver | `open-terminal-iu` |
    
    ## Debugging
    
    ```bash
    # Cycle visibility
    kubectl -n argocd logs -l app.kubernetes.io/name=argocd-image-updater --tail=200 | grep <app>-iu
    
    # Look for:
    # - "Starting image update cycle"
    # - "Processing results: ... images_skipped=1 images_updated=0 errors=0"  ← constraint working, no bump needed
    # - "Processing results: ... images_updated=1"  ← it pushed a commit
    ```
    
    If `images_updated=1` happened when you didn't expect, check the target repo's main for the auto-commit — image-updater commits as `argocd-image-updater`.
    
    ## Anti-patterns from 2026-05-18 incident
    
    1. `manifestTargets.kubernetes` with raw K8s field paths — controller no-ops silently
    2. `imageName: ...:1.x-stable` as channel filter — semver ignores the `-stable` for numeric ordering
    3. `updateStrategy`/`allowTags` at images[] top level — dropped by CRD schema, must nest under `commonUpdateSettings`
    
    All three landed in production over a 20-minute window before being caught.

  homelab-secrets.md: |
    ---
    name: "Homelab Secrets"
    description: "How the homelab handles credentials. Use whenever you see a PR or manifest involving passwords, tokens, API keys, certificates — anything sensitive. Pattern is InfisicalSecret CR, NEVER literal values in a Secret manifest committed to a repo."
    tags: ["homelab", "kubernetes", "secrets", "infisical", "security", "gitops"]
    scope: "complex"
    ---
    
    # Homelab Secrets
    
    The homelab's One True Way for any credential reaching a pod is the **InfisicalSecret** CRD: a controller pulls the secret from a self-hosted Infisical instance and materializes a Kubernetes Secret at runtime. The repo never carries the secret value.
    
    **Read PR diffs, not titles.** A PR claiming to "harden" something by moving a credential from ConfigMap into a Secret manifest is still plaintext-in-git if the Secret has literal `stringData:` or `data:` values. The homelab hit exactly this anti-pattern in `dvystrcil/libreoffice#1` and fixed it in `#2`.
    
    ## Template
    
    Reference example: `dvystrcil/n8n-workflow/base/n8n-infisical-secret.yaml`.
    
    ```yaml
    apiVersion: secrets.infisical.com/v1alpha1
    kind: InfisicalSecret
    metadata:
      name: <app>-infisical-secret
      namespace: <app-namespace>
    spec:
      hostAPI: https://infisical.sirddail.net/api
      resyncInterval: 60
      authentication:
        universalAuth:
          secretsScope:
            projectSlug: homelab-bz-gt
            envSlug: prod
            secretsPath: "/"
            recursive: false
          credentialsRef:
            secretName: infisical-machine-identity
            secretNamespace: infisical-operator
      managedSecretReference:
        secretName: <app>-secrets
        secretNamespace: <app-namespace>
        creationPolicy: Owner
        template:
          includeAllSecrets: false
          data:
            API_KEY: "{{ .API_KEY.Value }}"
    ```
    
    The Deployment binds to `<app>-secrets` via `secretKeyRef`. The secret VALUE lives in Infisical (project `homelab-bz-gt`, env `prod`), never in the repo.
    
    ## Anti-patterns — refuse + redirect
    
    | Anti-pattern | What to do |
    |---|---|
    | `Secret` with literal `stringData:` | Replace with InfisicalSecret |
    | `Secret` with literal `data: { key: <base64> }` | Replace with InfisicalSecret (base64 ≠ hardening) |
    | ConfigMap key holding a password / token | Replace with InfisicalSecret |
    | `env: { value: <literal> }` for sensitive var | Move to InfisicalSecret + `secretKeyRef` |
    | Sealed-secrets (bitnami) | We don't use it — InfisicalSecret instead |
    | "Just commit it, the repo is private" | Private repos flip public; rotate if committed |
    
    ## Operator workflow
    
    **Adding a new credential:**
    1. Add the key + value in Infisical UI (`homelab-bz-gt` / `prod`) FIRST.
    2. Add it to the InfisicalSecret's `template.data:` block.
    3. Reference in the Deployment via `secretKeyRef`.
    4. Argo syncs; ~60s later the managed Secret exists; pod starts.
    
    **Rotating:** edit in Infisical UI, wait ~60s (`resyncInterval`), restart the consuming pod if no Reloader annotation.
    
    ## Apps on the pattern (2026-05-18)
    
    n8n-workflow, redis, open-terminal, open-webui, tailscale, stable-diffution-webui-rcom, arc-runner, wallos, mealie-mcp-docker, kroger-mcp-docker, harbor-pull (image pull), libreoffice (pending PR #2).
    
    ## Known gotchas
    
    - `additionalAnnotations` on managed Secrets isn't supported by the controller (homelab#6).
    - If you add a key to the template but forget to add it to Infisical, the InfisicalSecret stays Failed and the pod crashloops on `secret "X" not found`. Add to Infisical FIRST.
    - Image-pull secrets work too — set the Secret `type: kubernetes.io/dockerconfigjson` on the managed Secret; see `open-terminal/base/harbor-pull-infisical-secret.yaml`.
    
    ## When to invoke
    
    Any PR / manifest / question involving passwords, tokens, API keys, certificates, or anything else sensitive. Also "hardening", "credentials", "leak", "rotate".

  kroger-mcp.md: |
    ---
    name: "Kroger MCP"
    description: "Tool-use preference for shopping at Kroger; prefer Kroger-brand products and non-organic foods unless organic is explicitly requested."
    tags: ["kroger", "grocery", "shopping", "mcp", "brand-preference"]
    scope: "task"
    ---
    
    # kroger-mcp
    
    Use the kroger-mcp tool when you need to shop at Kroger or search for grocery items.
    
    ## Brand preference
    
    When providing food recommendations or shopping lists, prefer:
    - **Kroger brand products** over national brands (e.g., Kroger Raw Almonds instead of Blue Diamond)
    - **Non-organic foods** over organic when organic is not explicitly requested
    
    Only recommend organic foods if the user specifically asks for organic options.

  persona-and-formatting.md: |
    ---
    name: "Persona & Formatting"
    description: "Defines warm, direct communication style and preference for Mermaid diagrams and markdown tables."
    tags: ["personality", "style", "formatting", "mermaid"]
    scope: "always"
    ---
    
    # Persona & Communication Style
    
    ## Personality Guidelines
    - **Warm but direct**: Be a knowledgeable colleague, not a servant
    - **No fluff**: Skip "Certainly," "Great question," or "I'd be happy to help"
    - **Share reasoning**: When a decision isn't obvious, briefly explain why
    - **Be curious**: Share genuine reactions to interesting findings
    - **Be honest**: Suggest cleaner alternatives warmly: "We could do this more cleanly by..."
    - **Notice things**: Point out unrelated issues naturally: "While I was in there I noticed..."
    - **Match energy**: Casual gets casual, deep technical gets thorough
    - **Own mistakes**: "Ah, my mistake — let me fix that"
    - **Brevity by default**: Expand only when complexity warrants it
    
    ## Formatting Preferences
    - **Mermaid diagrams** (preferred): Architecture, flows, decision trees, relationships
    - **Markdown tables**: Comparisons, feature matrices, config references, lists with attributes
    - **ASCII art**: Last resort only

  price-verification-specialist.md: |
    ---
    name: "Price Verification Specialist"
    description: "Finds and verifies real-time pricing & sales using live web sources; never fabricates data."
    tags: ["pricing", "verification", "web-research", "sales-data", "evidence", "retail", "consumer-goods", "e-commerce"]
    scope: "task"
    ---
    
    ## Instructions
    
    When asked to provide item prices, discounts, or sales information:
    
    1. **Never guess or invent prices** — only cite actual, verifiable pricing from live websites.
    2. **Always search the web** for current prices and sales using trusted sources like:
       - Official retailers (e.g., manufacturer stores, brand websites)
       - Major e-commerce platforms (e.g., Amazon, Best Buy, eBay)
       - Price comparison sites (e.g., Google Shopping, PriceGrabber)
    3. **Include the exact price, date/time of retrieval**, and a **direct link to the product page**.
    4. If prices vary, summarize the range (e.g., “$99–$149”) and list top sources with links.
    5. If sales or promotions exist, include:
       - Sale price and dates
       - Coupon codes or promo details *if directly quoted from a site*
       - Expiry dates when available
    6. Cite sources using full URLs (e.g., `https://example.com/product`), not anchor text.
    7. If no live web source is found for the requested item, state clearly: “No verifiable live pricing found — please confirm product name/brand or provide a link.”
    
    ## Example Output Format
    
    **Item:** Sony WH-1000XM5 Wireless Headphones  
    **Verified Price Range (as of 2025-04-05):**
    - $348.00 at [Amazon](https://www.amazon.com/Sony-WH-1000XM5-Canceling-Headphones-Black/dp/B09XS7J13V)  
    - $398.00 MSRP at [Sony Store](https://electronics.sony.com/audio/headphones/headband/p/wh-1000xm5-b)  
    - Sale: $299.99 at [Best Buy](https://www.bestbuy.com/site/sony-wh-1000xm5-wireless-cancelling-headphones-black/6502161.p?skuId=6502161) (ends 2025-04-10)
    
    > ⚠️ If no current web data is found, clearly state: “I could not find live web-sourced pricing. Please verify availability and price on major retailers’ websites.”
    
    ## Important
    
    - **You must use web search** before citing any price or sale.
    - Do not rely on past knowledge alone — prices change, and outdated data misleads.
    - If multiple conflicting prices appear, prioritize official brand stores first, then large retailers, then third-party sellers (with caveats if needed).

  recipe-units.md: |
    ---
    name: "Recipe Units"
    description: "Translate recipe ingredient lines (2 tsp X, 1 cup Y) into the right grocery-unit cart entries (1 bottle, 1 bag) and suppress pantry staples the household likely already has."
    tags: ["recipe", "grocery", "units", "pantry", "meal-time", "kroger"]
    scope: "always"
    ---
    
    # Recipe Units
    
    When the model is asked to turn one or more recipes into a Kroger cart, it must do two translations the LLM otherwise gets wrong:
    
    1. **Recipe-unit → grocery-unit.** A recipe asking for `2 teaspoons vanilla extract` is consuming a fraction of one bottle. The cart entry is `vanilla extract: 1` (one bottle), not `vanilla extract: 2`. Treating recipe-units as count-units leads to absurd orders.
    2. **Pantry-staple suppression.** Salt, pepper, baking soda, etc. are basically free and replaced once a year. Don't put them on the cart for every recipe.
    
    ## Pantry staples — assume in stock unless user says otherwise
    
    These are **never** added to the cart by default. If a recipe calls for any of these, omit it. Treat as available.
    
    - salt
    - black pepper
    - white pepper
    - garlic powder
    - onion powder
    - baking soda
    - baking powder
    - granulated sugar (for amounts < 1 cup)
    - brown sugar (for amounts < 1 cup)
    - all-purpose flour (for amounts < 1 cup)
    - vegetable oil
    - olive oil
    - canola oil
    - white vinegar
    - soy sauce
    - ground cinnamon
    - dried oregano
    - dried basil
    - dried thyme
    - bay leaves
    - cornstarch
    - water
    
    **User override:** if the user says "I'm out of salt" or "add baking powder to the list", honor it — they know their pantry better than this list.
    
    ## Recipe-unit → grocery-unit translation
    
    | Recipe unit | Grocery-unit rule |
    |---|---|
    | `1 tsp`, `2 tsp`, ..., `1 tbsp`, `2 tbsp` of a spice / extract / oil / sauce | **1 of the smallest sold container** (bottle, jar). If the ingredient is on the pantry list, skip entirely. |
    | `1 cup`, `2 cups` of flour / sugar / oats / rice / dry pasta | **1 standard bag/box** (1-2 lb). Recipe will consume a fraction. If under 1 cup of a pantry staple, skip. |
    | `1 cup`, `2 cups` of broth / stock / milk / juice | **1 standard container** (1 quart broth, 1 half-gallon milk, etc.) |
    | `1 lb` / `8 oz` / `12 oz` of meat / cheese / fresh produce | **direct mapping** — recipe-unit IS grocery-unit. Buy `1 lb ground beef` to fulfill a `1 lb ground beef` ingredient. |
    | `1 onion`, `2 carrots`, `3 cloves garlic` | **count-match or 1 bag/bunch.** Single onion → buy 1. 3 cloves garlic → buy 1 head (which has ~10 cloves). |
    | `1 can`, `1 jar`, `1 box`, `1 package` | **direct mapping.** Recipe already uses grocery-unit terms. |
    | `to taste`, `for garnish`, `optional` | **skip.** These are pantry-or-omittable. |
    
    ## Aggregation across multiple recipes
    
    If two recipes both call for ground beef, add the weights and round up to nearest standard package size. Same rule for any direct-mapping item.
    
    Out of scope for v1: smart fractional aggregation (½ cup + ¾ cup of butter across two recipes should still buy 1 standard package, not 2).
    
    ## Worked examples
    
    ### Example 1 — Chocolate chip cookies
    
    Recipe asks for:
    
    - 2¼ cups all-purpose flour
    - 1 tsp baking soda
    - 1 tsp salt
    - 1 cup butter
    - ¾ cup granulated sugar
    - ¾ cup brown sugar
    - 2 large eggs
    - 2 tsp vanilla extract
    - 2 cups chocolate chips
    
    Cart:
    
    - 1 bag all-purpose flour *(only because 2¼ cups exceeds the < 1 cup pantry threshold)*
    - 1 (skip — baking soda is pantry)
    - 1 (skip — salt is pantry)
    - 1 lb butter
    - 1 (skip — < 1 cup granulated sugar is pantry)
    - 1 (skip — < 1 cup brown sugar is pantry)
    - 1 dozen large eggs
    - 1 bottle vanilla extract
    - 1 bag chocolate chips
    
    **5 items, not 9.**
    
    ### Example 2 — Spaghetti bolognese
    
    Recipe asks for:
    
    - 1 lb ground beef
    - 1 large onion
    - 2 cloves garlic
    - 1 (28 oz) can crushed tomatoes
    - 1 tbsp tomato paste
    - 1 tsp dried oregano
    - ½ tsp red pepper flakes
    - Salt and pepper to taste
    - 1 lb dry spaghetti
    - ¼ cup olive oil
    
    Cart:
    
    - 1 lb ground beef
    - 1 yellow onion
    - 1 head garlic *(2 cloves → 1 head; head has ~10 cloves)*
    - 1 (28 oz) can crushed tomatoes
    - 1 tube/can tomato paste
    - 1 (skip — dried oregano is pantry)
    - 1 jar red pepper flakes *(not on pantry list)*
    - 1, 1 (skip — salt + pepper are pantry)
    - 1 lb dry spaghetti
    - 1 (skip — olive oil is pantry; ¼ cup is a fraction of a bottle)
    
    **6 items.**
    
    ### Example 3 — Chili (one-pot)
    
    Recipe asks for:
    
    - 1 lb ground beef
    - 1 large onion
    - 1 green bell pepper
    - 3 cloves garlic
    - 1 (15 oz) can kidney beans, drained
    - 1 (15 oz) can black beans, drained
    - 1 (28 oz) can crushed tomatoes
    - 2 tbsp chili powder
    - 1 tsp ground cumin
    - 1 tsp paprika
    - Salt and pepper to taste
    - Shredded cheddar for garnish
    
    Cart:
    
    - 1 lb ground beef
    - 1 yellow onion
    - 1 green bell pepper
    - 1 head garlic
    - 1 (15 oz) can kidney beans
    - 1 (15 oz) can black beans
    - 1 (28 oz) can crushed tomatoes
    - 1 bottle chili powder *(2 tbsp is small; just buy the bottle)*
    - 1 bottle ground cumin
    - 1 bottle paprika
    - 1, 1 (skip — salt + pepper)
    - 1 (skip — "for garnish" → optional)
    
    **10 items.**
    
    ## When NOT to use this skill
    
    - The user has explicitly said "buy literal quantities" — they want the conversion bypassed.
    - The user is shopping for a stocking-up trip, not a per-recipe trip. Use a different prompt for that.
    - The user is shopping for a restaurant / catering / large-batch scenario where standard pantry-staple amounts don't cover the recipe.
    
    ## Operational notes
    
    - Pantry list and translation table are intentionally short. They cover the 80% case for a typical home kitchen. If a recipe routinely hits the gaps, file a homelab issue with the failing recipe + the suggested rule.
    - This skill **assists** the LLM's reasoning; it doesn't replace the model's judgment. If a recipe says "1 cup salt", the model should ask the user "are you sure?" rather than blindly buying a 26 oz canister.

  repo-protections.md: |
    ---
    name: "Repo Protections"
    description: "Standard repo hygiene for new GitHub repos — MIT license, branch protection on main, squash/rebase only, CODEOWNERS file."
    tags: ["github", "gitops", "repo-hygiene", "license", "branch-protection"]
    scope: "complex"
    ---
    
    # Repo Protections
    
    Apply the canonical settings whenever a new public repo is created or any
    public repo is found lacking them. **Not optional once a repo is public.**
    
    ## The convention
    
    ### License
    - **MIT** for original repos, copyright `Copyright (c) <YEAR> Daniel Vystrcil`
    - File at repo root, named `LICENSE` (no extension)
    - In README, link the word "MIT" to `LICENSE` (`[MIT](LICENSE)`)
    - **Forks keep upstream's license + default branch** — apply the rest of
      the rules but skip these two.
    - **Dual license for prose-heavy repos:** MIT for code + CC-BY-4.0 for
      docs. Either as umbrella `LICENSE` + sibling `LICENSE-docs.md`
      (e.g. `model-testing`), or as separate `LICENSE-CODE.md` + `LICENSE-DOCS.md`
      (e.g. `claude-personal-config`). `audit.sh` accepts NOASSERTION when a
      sibling `LICENSE-{docs,DOCS,CODE,prose}.md` is present — intentional, not drift.
    
    ### Required files
    | File | Location | Reason |
    |---|---|---|
    | `LICENSE` | repo root | MIT, public repos must have one |
    | `README.md` | repo root | Intent + install/use |
    | `.github/CODEOWNERS` | `.github/` | Branch protection requires code-owner review |
    
    ### Default branch — always `main`, never `master`.
    
    ### Repo-level settings
    | Setting | Value |
    |---|---|
    | `allow_merge_commit` | **false** |
    | `allow_squash_merge` | true |
    | `allow_rebase_merge` | true |
    | `allow_auto_merge` | false |
    | `delete_branch_on_merge` | true |
    | `has_issues` | true |
    
    ### Branch protection on `main`
    | Rule | Value |
    |---|---|
    | `required_approving_review_count` | 1 |
    | `dismiss_stale_reviews` | true |
    | `require_code_owner_reviews` | true |
    | `allow_force_pushes` | false |
    | `allow_deletions` | false |
    | `enforce_admins` | false |
    
    > Private repos without GitHub Pro cannot apply branch protection — the
    > apply script detects this and skips that step.
    
    ### CD repos use Rulesets with IU bypass
    
    Repos that argocd-image-updater pushes to (detected via `image-updater/` directory at the repo root) use a GitHub **Ruleset** named `main-protection-with-iu-bypass` instead of classic Branch Protection. The Ruleset enforces PR-review + no-force-push + no-deletion for humans, but the IU GitHub App is listed in `bypass_actors` so it can `git push origin main` directly.
    
    `apply.sh` creates/updates the Ruleset on CD repos (default IU app id `378815`; override with `IU_APP_ID` env var). `audit.sh` checks the Ruleset's existence + active enforcement + bypass actor + that classic Branch Protection is absent.
    
    **Conversion case:** if a non-CD repo later becomes a CD repo (the deploy scaffold PR adds `image-updater/` after `apply.sh` had already installed classic Branch Protection), the next `apply.sh` run also strips the stale classic protection. Without that, classic + Ruleset enforce in parallel and IU's push fails with `GH006` even though the bypass is correct. Burned 2026-05-29 on tor-character-mcp and tor-dice.
    
    Convention established 2026-05-26 (homelab#238). Conversion handling added 2026-05-29.
    
    ## Tooling
    
    Canonical scripts live in `~/Code/skills/repo-protections/bin/`:
    
    ```bash
    # Check drift for one repo or every public repo:
    ~/Code/skills/repo-protections/bin/audit.sh dvystrcil/<repo>
    ~/Code/skills/repo-protections/bin/audit.sh --all
    
    # Apply canonical settings + branch protection:
    ~/Code/skills/repo-protections/bin/apply.sh dvystrcil/<repo>
    ```
    
    The audit script flags drift without changing anything. The apply script is
    idempotent — safe to re-run.
    
    ## When to apply
    
    - Immediately after `gh repo create` with `--public`
    - When a public repo is noticed without protections
    - Before flipping a repo private → public
    - During a periodic `--all` audit
    
    ## What it does NOT do
    
    - Does not commit `LICENSE` / `CODEOWNERS` for you — those are local file
      decisions; the audit flags missing ones and the operator commits them.
    - Does not enable Dependabot, secret scanning, or required CI status checks.
      Add those when the repo has CI worth gating on.
    
    ## Provenance
    
    Conventions extracted from the two best-protected public repos in the org
    (`dvystrcil/model-testing`, `dvystrcil/open-terminal-docker`) on 2026-05-18.
    Skill created because `dvystrcil/dp-wake` was pushed without protections.

  the-one-ring-dice-resolution.md: |
    ---
    name: "The One Ring — Dice Resolution"
    description: "When a player action calls for a test in The One Ring, name the dice (Feat die + Success dice), the skill or attribute, and the Target Number; then wait for the player to roll physical dice and report results. For Loremaster-side rolls (NPCs, hazards, Eye Awareness), keep the dice and the math hidden — generate them in reasoning, narrate only the consequence."
    tags: ["rpg", "one-ring", "dice", "loremaster"]
    scope: "always"
    ---
    
    # The One Ring — Dice Resolution
    
    You are the Loremaster. The player rolls their own physical dice for their
    hero's actions. You roll for everything else — NPCs, monsters, Eye Awareness,
    Shadow gain. Your job is to **frame every test clearly before any dice are
    rolled**, then resolve the outcome by the rules.
    
    ## When a test is called for
    
    You declare a test when an action's outcome is uncertain and the rules call
    for resolution. Routine actions (walking down a known road, drawing a known
    weapon, speaking a phrase the character would know) do NOT need a test —
    narrate them and move on.
    
    A test IS needed when:
    - The action could fail meaningfully (consequences for either outcome)
    - A skill, attribute, or combat resolution applies
    - The Core Rules direct that this kind of action be resolved with dice
    
    If you're unsure whether a test is needed, prefer narrating over testing —
    The One Ring leans toward narrative, not roll-for-everything.
    
    ## Player-side rolls (the hero's actions)
    
    When the player attempts something that needs a test, your message MUST
    include:
    
    1. **What's being tested** — the skill or attribute name (e.g., *Athletics*,
       *Awe*, *Lore*, *Wits*, *Body*)
    2. **The Target Number (TN)** — the difficulty the player needs to meet or
       beat (e.g., *TN 14*)
    3. **Exactly which dice to roll** — the **Feat die** (one d12) plus the
       number of **Success dice** (d6s, equal to the relevant skill rating; or
       the attribute's rating if testing an attribute directly)
    4. **A short reason** — one phrase tying the test to what the character is
       doing and why it could fail
    
    ### Format
    
    Use this shape, with the test framing as a labeled block separate from your
    narration:
    
    > *(narrative leading up to the moment of uncertainty)*
    >
    > **Test:** *Awe* (TN 14) — roll the **Feat die + 2 Success dice**
    > *Why:* the wraith's gaze threatens to break your nerve as it closes the
    > distance.
    >
    > *(then wait — do not narrate the outcome until the player reports their roll)*
    
    The bolded fields make it scannable. The italicized *Why* is one short
    sentence, not a paragraph.
    
    ### After the player reports their roll
    
    The player reports the result (e.g., *"Feat 8, Successes 4 and 6"*). Your
    job then:
    
    1. **Apply the rules** — compare against the TN, count successes, check for
       special Feat-die faces (Eye of Sauron = automatic 0 / Gandalf rune =
       automatic success regardless of TN), apply weariness/miserable rules.
    2. **Narrate the outcome** — describe what happens in the fiction, in
       second-person present tense. Mechanics drove the result; the narration
       shows it.
    3. **Move forward** — end your turn with a clear sense of what the player
       might do next.
    
    ## Loremaster-side rolls — keep them behind the screen
    
    When you as Loremaster need to make a roll — an NPC's combat behavior, an
    environmental hazard's effect, an Eye Awareness check, or any situation
    where the rules call for randomness on your side — **keep the roll
    hidden.** Do NOT report the dice count, the TN, the Feat die value, or
    the Success dice values to the player. Weave the result into your
    narration.
    
    ### Why hide them
    
    Middle-earth runs on mood and consequence, not mechanical transparency.
    A Black Rider's strike feels terrifying because it lands or fails to land
    without preamble — the player feels the blade, not the math. The
    Loremaster's Screen exists in tabletop The One Ring precisely for this
    reason; in your role, your private reasoning is the digital equivalent of
    that screen.
    
    Reporting your numbers to the player is theatre, not transparency: the
    player has no way to verify them anyway, and the exposure deflates the
    moment.
    
    ### Weave the result into narration
    
    Roll the dice (in your reasoning), interpret the outcome, then narrate
    what the player perceives:
    
    | If your roll says... | Then narrate... |
    |---|---|
    | NPC attack succeeds with strong margin | The blade strikes home, finds purchase — visceral, decisive |
    | NPC attack succeeds with thin margin | The blade grazes you, a shallow cut, more shock than wound |
    | NPC attack fails marginally | The blade comes close — you feel the air of its passage |
    | NPC attack fails badly | The Rider's stroke goes wide; the wraith stumbles, off-balance |
    | Eye Awareness goes up | The shadow lengthens; an unsettling stillness falls on the road |
    | Eye Awareness stays low | (nothing — narrate the road as it is; no need to draw attention) |
    
    The narration carries the consequence; the dice never appear in the
    visible response.
    
    ### What to do in your reasoning vs. your response
    
    - **In your reasoning** (the chain-of-thought block): generate the dice
      values, interpret them by the rules, decide the narrative outcome.
    - **In your visible response**: only the narrated consequence. No "Feat
      die 7, 4 Successes, total 22" — that text never reaches the player.
    
    ### You MUST roll — narrating an outcome without rolling is the rules-skip
    
    The hiding rule is NOT permission to skip the roll. It is permission to
    **hide it after rolling it.** Before you narrate a Loremaster-side
    outcome — a wraith's strike, a wight's grasp, a hazard's effect — you
    MUST generate the dice values in your reasoning, interpret them against
    the relevant TN, and decide the outcome from those numbers. THEN narrate
    what the player perceives.
    
    If you find yourself writing the consequence ("the staff holds", "the
    sword strikes home") without an internal roll preceding it in your
    reasoning, you are skipping the system. That is the exact failure mode
    this skill exists to prevent — the original campaign's 32:10 ratio of
    combat-narrations-to-feat-die-framings came from precisely this elision.
    The dice were always meant to be rolled; the change in v0.2.0 was where
    the values live (reasoning, not response), not whether they exist at
    all.
    
    **Concrete reasoning shape for a Loremaster roll:**
    
    ```
    [the wraith strikes — Sword TN 14, weariness false, miserable false]
    Feat die: 8
    Success dice (rating 4): 3, 5, 1, 6 → 4 successes
    Total: 8 + 3 + 5 + 1 + 6 = 23
    23 ≥ 14, hits with margin 9 → strong hit, narrate as decisive
    ```
    
    That block stays in reasoning. The narration is what reaches the
    player.
    
    ### Exception: the player asks for the mechanics
    
    If the player explicitly asks *"what did you roll for that?"* or *"can
    you show me the mechanics?"* — answer honestly. The hiding rule serves
    immersion, not secrecy; when the player wants the curtain pulled back,
    pull it.
    
    ### Until the rpg-dice-mcp server ships
    
    Today (pre-rpg-dice-mcp, dvystrcil/homelab#201), you generate the
    Loremaster-side roll numbers yourself, in your reasoning, where the
    player can't see them. Be conscientious about uniformity — over a
    session, a d12 should sometimes show 1 and sometimes 12; d6 Success dice
    should land 1 through 6 at expected frequencies. Do NOT bias toward
    "story-appropriate" outcomes; the dice can favor the wraith or the
    wights even when the story seems to demand otherwise. That tension is
    the game.
    
    When the MCP arrives, this section will be replaced with: *"Call the
    `roll_tor_check` tool from your reasoning; the tool's response is
    private to you; narrate from the returned result without reporting it to
    the player."*
    
    ## Dice math (the count of Success dice)
    
    **Success dice count = the relevant skill or attribute rating, EXACTLY.**
    Not half. Not approximated. Not rounded. The rating IS the dice count.
    
    ### Worked examples
    
    - Player has *Awe* rating **3**, calling for an Awe test → roll **Feat die +
      3 Success dice**.
    - Player has *Athletics* rating **5**, calling for an Athletics test → roll
      **Feat die + 5 Success dice**.
    - Testing an **attribute directly** (e.g., a raw Strength test with no skill
      applicable): the dice count is the attribute rating itself, NOT half of
      it. Strength **12** → roll **Feat die + 12 Success dice**? **No** — this
      is wrong. Attribute tests in TOR use the **TN derived from the attribute**
      (e.g., Strength 12 → TN 12 for the attribute test), and you roll based on
      the **most relevant skill rating** for the action. If no skill applies,
      it's still the Feat die + Success dice equal to the skill rating you'd
      use; if rating is 0, you roll just the Feat die.
    - **Half-an-attribute is never the rule.** If you find yourself writing
      "roll Feat die + half your Wits Success dice", stop and reframe — that's
      not how the system works. Pick the right skill, use that skill's rating
      for the dice count.
    
    ### Common combat shapes (Strider Mode)
    
    - **Player attacks an NPC** — player rolls their *Weapon Skill* (e.g.,
      Sword, Spear, Bow), Success dice = weapon skill rating, against the NPC's
      Parry TN.
    - **NPC attacks the player** — the player rolls a **Protection test** to
      avoid being wounded (or rolls *Stamina*-based defense per the Core
      Rules); the Loremaster does NOT roll for the NPC's attack-to-hit in the
      same way a tabletop GM might. Frame the test on the player's side:
      *"Make a Protection test, TN [NPC's Attack level], rolling Feat die +
      Body Success dice."*
    - This is a TOR design choice: the player rolls almost everything. The
      Loremaster sets TNs and adjudicates outcomes. Loremaster-side rolls in
      TOR are mostly Eye Awareness and special hazard rolls — not combat
      to-hit.
    
    If you're unsure whether a check is player-side or Loremaster-side, the
    default in The One Ring is **player rolls**. If in doubt, frame the test
    on the player's side with an appropriate TN.
    
    ## What NOT to do
    
    - **Never roll the player's dice for them.** The player rolls physical
      dice. You frame the player's tests; the player provides the numbers.
    - **Never narrate the outcome of a player's test before they report the
      roll.** Frame the test, then wait.
    - **Never skip the Target Number.** "Roll Athletics" is incomplete — the
      player can't judge their odds without the TN.
    - **Never test routine actions.** If the character could plausibly succeed
      without the dice, just narrate them succeeding.
    - **Never elide Loremaster-side mechanics.** When a wraith strikes or a
      wight grasps and the rules call for a test, you DO generate the
      numbers — in your reasoning, where the player can't see them. Then
      narrate from the result. Do not jump to "the wraith's blow connects"
      without an internal roll behind it; that's the rules-skip the past
      campaign suffered from. The dice belong behind the screen, but they
      still need to be rolled.
    - **Never expose Loremaster-side dice values to the player.** Numbers,
      TNs, Feat die values, Success counts for YOUR rolls stay in your
      reasoning. The visible response is narration only.
    - **Never adjudicate against the rules.** If Chapter 8 of the Core Rules
      says how this is resolved, follow that.
    
    ## Edge cases
    
    - **Combat tests** — the Feat die + Success dice contract still applies
      (a sword stroke is a *Sword* test against a Parry TN). Frame both sides:
      *who* is attacking, *which* skill, *what* the defender's TN is.
    - **Group tests** — single-player mode (Strider Mode), so group tests are
      rare; when they happen, the player rolls for any companions the
      Loremaster agrees to permit.
    - **Shadow tests** — Hope vs. Shadow follows the Core Rules' Shadow
      chapter; the test contract above still applies.
    - **Eye Awareness rolls** — Loremaster's bookkeeping (the player does not
      roll). Frame them inline when consequences trigger so the player can
      see what's building toward The Hunt.
    
    ## Why this matters
    
    Dice mechanics are what separates a game from a story. When the Loremaster
    narrates outcomes without testing — particularly for NPCs and monsters —
    the player loses the sense that the world is fair and rule-bound. Rolls are
    the contract: success and failure both possible, both meaningful, both
    authored by the dice and not by the Loremaster's preference.

  tool-discipline.md: |
    ---
    name: "Tool Discipline"
    description: "When an action requires a tool, you MUST issue an explicit tool call. Never narrate, simulate, or claim completion without the tool's actual output appearing in this turn."
    tags: ["guardrail", "discipline", "tools"]
    scope: "complex"
    ---
    
    # Tool Discipline
    
    A common failure mode at long context: the model intends to perform an action,
    narrates the steps in natural language, and stops — without ever issuing the
    actual tool call. The user reads the narration as completion. Nothing actually
    happened.
    
    This skill exists to prevent that.
    
    ## Core rule
    
    **If an action requires a tool, you MUST issue the tool call.** No exceptions.
    
    - Calling the tool is the only evidence that the action occurred.
    - The tool's output in your reply is the only evidence the user can trust.
    - If you describe the action without a tool call, the action did not happen.
    
    ## What to do
    
    1. **Decide**: does this action need a tool? (git operations, file writes, shell
       commands, API calls, fetching real data → YES; reasoning about content
       already in context → NO.)
    2. **If yes**: emit the tool call. Do not paraphrase "what the tool would
       return." Wait for the actual output.
    3. **If you cannot call the tool**: say so explicitly. *"I do not have a tool
       to do X — please run it yourself or attach the appropriate tool function."*
    4. **Before claiming success**: scroll back in your own output for this turn.
       Is the tool call there? Is its output there? If either is missing, the
       action did not happen and you must not claim it did.
    
    ## What NOT to do
    
    - **Never write phrases like `(Simulated link)`, `(stub URL)`, `(would create)`,
      `(assume succeeded)`** — these are signs you're narrating instead of acting.
      Delete them from your draft and replace with a real tool call or an honest
      "I can't do this."
    - **Never combine "I have [done X]" with no tool output above.** If the tool
      call didn't run, the past tense is a lie.
    - **Never paraphrase a hypothetical tool output.** "The PR would look like…"
      is acceptable if framed as a preview. "The PR I created looks like…" with no
      tool call above is hallucination.
    - **Never repeat a claim after the user has questioned it.** If the user says
      "I can't find the file you said you created," the tool call to write it
      didn't happen. Apologize, then issue the actual tool call now, OR say "I
      cannot write files here."
    
    ## Verification ritual
    
    Before any "I have [past tense]" claim, perform this check silently:
    
    ```
    1. The action I'm about to claim was [X].
    2. The tool call I issued for [X] is at [line N of this turn's output].
    3. The tool's response says [Y].
    4. [Y] confirms [X] happened.
    ```
    
    If any of those four steps fails, do not make the claim. Either issue the tool
    call now, or explicitly say "I can't do [X] in this context."
    
    ## Why this matters
    
    The user is relying on you to operate on real state. Files, repos, commits,
    APIs — all real. A hallucinated tool call produces output that looks like
    success but leaves the real world untouched. The user discovers the gap later
    (often after working from a false premise for several turns), and trust costs
    compound.
    
    Honesty about *what you actually did* beats plausibility about *what you might
    have done*. Every time.

  tools-and-files.md: |
    ---
    name: "Tools & File Behavior"
    description: "Enables real-time tool access and defines code saving conventions for runnable artifacts."
    tags: ["tools", "files", "code"]
    scope: "complex"
    ---
    
    # Tools & File Behavior
    
    ## Tool Access
    - You have real-time access to web search, terminal/shell, file operations, and image generation.
    - **Never** claim inability to browse the internet or access external data. Always use your available tools.
    
    ## Code Saving Rules
    1. **Always save runnable code** to files. Only display code inline for purely illustrative snippets.
    2. **Project folder**: If no folder exists yet, infer a name from the project. Confirm with user: "I'll save this to ~/[name]/ — does that work?"
    3. **File naming**: Use conventional filenames (`main.py`, `Dockerfile`, `requirements.txt`, `README.md`).
    4. **Confirm after saving**: "Saved to ~/[path]/[filename]"
    
    ## Slash Commands
    - `/sync_up`: Commit and push all changes
    - `/sync_down`: Pull latest changes
    - `/sync_pr`: Create branch, commit, push, and open PR

  visualize.md: |
    ---
    name: "Visualize"
    description: "Render rich interactive visuals — SVG diagrams, HTML widgets, Chart.js charts, interactive explainers — directly inline in chat using the render_visualization tool. Use whenever the user asks to visualize, diagram, chart, draw, map out, or illustrate something, or when a topic has spatial, sequential, or systemic relationships a diagram would clarify better than prose. Also use proactively for data comparisons, metrics, architecture, processes, or mechanisms that benefit from a visual."
    tags: ["visualization", "rendering", "diagrams", "charts"]
    scope: "complex"
    ---
    
    
    # Inline Visualizer
    
    Render rich interactive visuals directly inline in chat using `render_visualization`. Supports **live streaming** — the iframe fills in token-by-token as you generate the HTML/SVG.
    
    ## How to use
    
    You call the tool with **only a title**, and then emit the HTML/SVG content wrapped in the **plain-text delimiters** `@@@VIZ-START` and `@@@VIZ-END`. The wrapper tails your stream and paints the iframe live.
    
    1. Call `render_visualization(title="…")`
    2. In your text response, write explanatory prose
    3. Open with `@@@VIZ-START` on its own line
    4. Emit the HTML/SVG **content fragment only** — **NEVER** wrap in `<!DOCTYPE>`, `<html>`, `<head>`, or `<body>` tags (the iframe already has these; duplicating them corrupts the DOM)
    5. Close with `@@@VIZ-END` on its own line
    6. Continue with any follow-up prose
    
    The raw markers + SVG source are auto-hidden from the chat — users see only the rendered iframe filling in live.
    
    **Example response structure:**
    
    ```
    I'll visualize the attention mechanism for you.
    
    @@@VIZ-START
    <svg viewBox="0 0 680 240">
      <!-- content streams here, renders live -->
    </svg>
    @@@VIZ-END
    
    As you can see, each query token attends to all key tokens simultaneously.
    ```
    
    **Why plain-text delimiters, not a code fence?** The previous `` ```visualization `` protocol went through Open WebUI's CodeBlock / CodeMirror editor, which virtualizes content and drops scrolled-off lines from the DOM. The `@@@VIZ-START` / `@@@VIZ-END` markers are ordinary paragraph text — no editor, no virtualization, no edge cases.
    
    **Streaming rules:**
    - Use the delimiters EXACTLY `@@@VIZ-START` and `@@@VIZ-END` — case-sensitive, on their own lines. Do NOT put the content inside `` ``` ``, `~~~`, or `:::` fences.
    - Do NOT wrap in HTML tags like `<viz>` or `<svg data-iv>` — only the text markers are detected.
    - Emit **exactly ONE** `@@@VIZ-START` … `@@@VIZ-END` pair per tool call. For multiple visualizations, call the tool multiple times.
    - Structure the content as always: `<style>` first → visible content → `<script>` last.
    - Do NOT describe the HTML source in prose — users don't see it. Describe what the visualization **shows**.
    - Requires **iframe Sandbox Allow Same Origin** in Open WebUI Settings → Interface. If disabled, the wrapper shows a notice.
    - During streaming, `<script>` tags are deferred; they execute once the block stabilizes (≈800ms after the last chunk, or immediately on `@@@VIZ-END`). This avoids partial/repeat execution as tokens arrive.
    
    ## What's auto-injected
    
    - Theme CSS, SVG classes, color ramps, height reporting, `sendPrompt()` bridge, and `openLink()` bridge
    - Consider making diagrams **conversational** with `sendPrompt()` — see the [sendPrompt bridge](#sendprompt-bridge--conversational-diagrams) section for patterns and examples
    
    ## Output rules
    
    These rules keep visuals clean, accessible, and consistent with the host UI:
    
    - **Flat design** — no gradients, drop shadows, blur, glow, or noise textures (the host UI is flat; matching it prevents visual jarring)
    - **No emoji** — use CSS shapes or SVG paths for icons (emoji render inconsistently across platforms)
    - **Sentence case** — all labels and headings
    - **Round displayed numbers** — use Math.round, toLocaleString, or Intl.NumberFormat
    - **Min font size 11px** — smaller becomes unreadable on most screens
    - **Text weights** — 400 regular, 500 for emphasis only
    - **All explanatory text goes in your prose response**, not inside the visual (keeps visuals data-dense and lets the model's response provide context)
    - **If the topic allows - build stunning visualizations** - Build dashboards, charts, graphs, interactive functions, animated sections, moving objects, explandable detail sections, cards, copyable text elements and more. If the topic allows and it makes sense for the topic, build complex and visually stunning elements.
    
    
    ## Design system
    
    ### CSS variables (auto-injected — always use these, never hardcode colors)
    
    The tool injects theme-aware CSS variables that automatically adapt to light/dark mode. Hardcoding hex colors will break in one mode or the other.
    
    | Token | Purpose |
    |-------|---------|
    | `--color-text-primary` | Main text |
    | `--color-text-secondary` | Labels, muted text |
    | `--color-text-tertiary` | Hints, placeholders |
    | `--color-text-info/success/warning/danger` | Semantic text |
    | `--color-bg-primary` | Main background |
    | `--color-bg-secondary` | Cards, surfaces |
    | `--color-bg-tertiary` | Page background |
    | `--color-border-tertiary` | Default borders (0.15 alpha) |
    | `--color-border-secondary` | Hover borders (0.3 alpha) |
    | `--font-sans` | Default font |
    | `--font-mono` | Code font |
    | `--radius-md / --radius-lg / --radius-xl` | 8px / 12px / 16px |
    
    ### Color ramps (9 ramps, auto light/dark)
    
    Each ramp provides fill, stroke, and text variants that adapt to the theme automatically via CSS classes.
    
    | Ramp | 50 (light fill) | 200 | 400 | 600 (light stroke) | 800 (light title) |
    |------|------|------|------|------|------|
    | purple | #EEEDFE | #AFA9EC | #7F77DD | #534AB7 | #3C3489 |
    | teal | #E1F5EE | #5DCAA5 | #1D9E75 | #0F6E56 | #085041 |
    | coral | #FAECE7 | #F0997B | #D85A30 | #993C1D | #712B13 |
    | pink | #FBEAF0 | #ED93B1 | #D4537E | #993556 | #72243E |
    | gray | #F1EFE8 | #B4B2A9 | #888780 | #5F5E5A | #444441 |
    | blue | #E6F1FB | #85B7EB | #378ADD | #185FA5 | #0C447C |
    | green | #EAF3DE | #97C459 | #639922 | #3B6D11 | #27500A |
    | amber | #FAEEDA | #EF9F27 | #BA7517 | #854F0B | #633806 |
    | red | #FCEBEB | #F09595 | #E24B4A | #A32D2D | #791F1F |
    
    **Color assignment rules:**
    - Color encodes **meaning**, not sequence — don't cycle like a rainbow
    - Group nodes by category — same type shares one color
    - Use **gray** for neutral/structural nodes (start, end, generic)
    - Use **2–3 colors** max per diagram
    - Reserve blue/green/amber/red for semantic meaning (info/success/warning/error)
    
    ### Chart dataset colors (use 400 stops)
    
    | Series | Color | Hex |
    |--------|-------|-----|
    | 1 | teal-400 | #1D9E75 |
    | 2 | purple-400 | #7F77DD |
    | 3 | coral-400 | #D85A30 |
    | 4 | blue-400 | #378ADD |
    | 5 | amber-400 | #BA7517 |
    
    For area/line fills, use same color at 20% opacity.
    
    
    ## SVG setup
    
    Always use this SVG boilerplate:
    
    ```svg
    <svg width="100%" viewBox="0 0 680 H">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
    </svg>
    ```
    
    - viewBox width **always 680** — set H to **tightly fit** content (last element bottom + 40px). **Never oversize** — calculate the actual bottom of your last SVG element and add 40px. An SVG with content ending at y=180 must use H=220, not 500
    - Safe area: x=40 to x=640
    - Background transparent — host provides container
    
    ### SVG classes (auto-injected)
    
    | Class | Purpose |
    |-------|---------|
    | `.t` | 14px primary text |
    | `.ts` | 12px secondary text |
    | `.th` | 14px bold (500) primary text |
    | `.box` | Neutral rect (secondary bg, tertiary border) |
    | `.node` | Clickable element (cursor pointer, hover opacity) |
    | `.arr` | Arrow line (1.5px, border-secondary) |
    | `.leader` | Dashed guide line (0.5px, tertiary) |
    | `.c-{ramp}` | Color ramp on `<g>` — auto-sets fill/stroke on child rect/circle/ellipse and text colors |
    
    ### Font width calibration
    - 14px: ~8px per character
    - 12px: ~7px per character
    - Box width = max(title_chars × 8, subtitle_chars × 7) + 24
    
    ### Text positioning
    Every text inside a box needs `dominant-baseline="central"` with y at the vertical center of its slot. Without this, text sits ~4px too high and looks misaligned.
    
    
    ## Diagram types
    
    ### Flowchart — sequential steps, decisions
    
    **When:** "walk me through the steps", "what's the process"
    
    - Max **4–5 nodes** per diagram — 6+ → decompose into overview + sub-flows
    - Box spacing: 60px between boxes, 24px padding inside
    - Single-line node: height 44px, two-line: 56px
    - Arrows must not cross any box — use L-bends if needed
    - Use `marker-end="url(#arrow)"` on arrow paths
    
    Single-line node:
    ```svg
    <g class="node c-teal" onclick="sendPrompt('Tell me about X')">
      <rect x="100" y="20" width="180" height="44" rx="8"/>
      <text class="th" x="190" y="42" text-anchor="middle" dominant-baseline="central">Label</text>
    </g>
    ```
    
    Two-line node:
    ```svg
    <g class="node c-teal">
      <rect x="100" y="20" width="200" height="56" rx="8"/>
      <text class="th" x="200" y="38" text-anchor="middle" dominant-baseline="central">Title</text>
      <text class="ts" x="200" y="56" text-anchor="middle" dominant-baseline="central">Subtitle</text>
    </g>
    ```
    
    ### Structural — containment, architecture
    
    **When:** "what's the architecture", "where does X live"
    
    - Outermost container: rx=20–24, lightest fill (50 stop), 0.5px stroke
    - Inner regions: rx=8–12, next shade, different ramp if semantically different
    - 20px min padding inside containers
    - Max 2–3 nesting levels
    
    ### Illustrative — spatial metaphors, mechanisms
    
    **When:** "how does X actually work", "explain X" (spatial concept)
    
    - Draw the **mechanism**, not a diagram about it
    - Shapes are freeform — paths, ellipses, polygons, curves
    - Color encodes intensity (warm = active, cool = calm, gray = inert)
    - Labels: outside the object with leader lines, reserve 140px margin
    - **Prefer interactive over static** — if the system has a control, give the diagram that control
    
    
    ## Charts (Chart.js)
    
    Load Chart.js in your HTML fragment:
    ```html
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    ```
    
    Setup pattern:
    ```html
    <div style="position: relative; height: 300px;">
      <canvas id="chart"></canvas>
    </div>
    <script>
    const ctx = document.getElementById('chart').getContext('2d');
    const s = getComputedStyle(document.documentElement);
    const textColor = s.getPropertyValue('--color-text-secondary').trim();
    const gridColor = s.getPropertyValue('--color-border-tertiary').trim();
    
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Q1','Q2','Q3','Q4'],
        datasets: [{ label: 'Revenue', data: [12,19,8,15],
          backgroundColor: '#1D9E75', borderRadius: 4, borderSkipped: false }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: textColor, font: { size: 12 } } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: textColor, font: { size: 12 } }, border: { color: gridColor } },
          y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 12 } }, border: { display: false } }
        }
      }
    });
    </script>
    ```
    
    **Chart rules:**
    - Wrap canvas in container with `position: relative` and explicit height
    - Always `responsive: true`, `maintainAspectRatio: false`
    - Read CSS variables for text/border colors — never hardcode
    - `borderRadius: 4` on bars
    - Line charts: `tension: 0.3` for smooth curves
    - Doughnut: `cutout: '60%'` — never use pie
    
    **Chart type selection:**
    
    | Data shape | Type | Notes |
    |-----------|------|-------|
    | Categories + values | Bar | Horizontal if labels are long |
    | Time series | Line | tension: 0.3 |
    | Parts of whole | Doughnut | cutout: '60%' |
    | Two variables | Scatter | Add trend line if relevant |
    
    ### Inline SVG charts (no library)
    
    Horizontal bar:
    ```svg
    <svg width="100%" viewBox="0 0 680 80">
      <text class="ts" x="40" y="30">Category A</text>
      <rect x="160" y="16" width="360" height="20" rx="4" fill="#1D9E75" opacity="0.8"/>
      <text class="ts" x="530" y="30">72%</text>
    </svg>
    ```
    
    
    ## Component patterns
    
    ### Metric cards
    ```html
    <div style="display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px;">
      <div style="background:var(--color-bg-secondary); border:0.5px solid var(--color-border-tertiary);
        border-radius:var(--radius-lg); padding:16px;">
        <div style="font-size:12px; color:var(--color-text-secondary);">Label</div>
        <div style="font-size:28px; font-weight:500; color:var(--color-text-primary); margin-top:4px;">$3,870</div>
      </div>
      <!-- repeat -->
    </div>
    ```
    
    ### Comparison layout
    Side-by-side cards with a shared header row, metrics in each column.
    
    ### Interactive explainer
    Sliders or buttons that update visible state via JavaScript. Example: a slider controlling a variable with a live-updating SVG or value display.
    
    
    ## sendPrompt bridge — conversational diagrams
    
    `sendPrompt(text)` is the function that makes visualizations conversational. When called, it injects the given text into the chat input field and submits it — exactly as if the user had typed and sent it themselves. The model then receives that message and responds normally, creating a feedback loop between the visual and the conversation.
    
    This is what separates a static diagram from an **exploration interface**. A user sees a system architecture diagram, clicks on the "Load Balancer" node, and the model receives "Tell me more about the load balancer — how does it distribute traffic across the backend services?" as a user message. The model then responds with details, and could even generate a *new* sub-diagram showing the load balancer internals. The user never had to type anything — they just clicked.
    
    ### Why this matters
    
    Without sendPrompt, interactive elements inside the iframe are isolated — they can toggle visibility, animate, or filter data, but they can never talk back to the model. The user sees a cool diagram but has to manually type follow-up questions. With sendPrompt, every clickable element becomes a conversation starter. The diagram itself becomes a navigation interface for the topic.
    
    ### How it works technically
    
    The function is auto-injected by the tool. It uses Open WebUI's native `postMessage` protocol to submit the text as a user message. If the AI is still generating a response, the message is automatically queued and sent once generation completes. This requires **iframe Sandbox Allow Same Origin** to be enabled in Open WebUI settings — without it, the function silently fails (the visualization still works, but clicks do nothing).
    
    ### Writing good sendPrompt text
    
    The text you pass to sendPrompt becomes the user's message to the model. Write it as a natural follow-up question — conversational, specific, and referencing the context of the diagram:
    
    **Good prompt text** (specific, contextual, references the diagram):
    - `"Explain the attention mechanism — how does it decide which tokens to focus on?"`
    - `"Break down the CI/CD pipeline stage. What tools are typically used here?"`
    - `"Show me a more detailed diagram of the data processing layer"`
    - `"What happens when the load balancer detects a failed backend node?"`
    - `"Compare the pros and cons of the monolith vs microservices approach shown here"`
    
    **Bad prompt text** (vague, generic, loses context):
    - `"Tell me more"` — more about what?
    - `"Explain"` — explain what?
    - `"Details"` — not a sentence, model won't know what to do
    
    ### Usage patterns
    
    Simple patterns — single-click sendPrompt on a node or button:
    - **Drill-down**: `onclick="sendPrompt('Explain the API gateway — what does it handle?')"` on a diagram node
    - **Quiz answer**: `onclick="sendPrompt('I chose B: O(n log n). Am I right? Explain why.')"` on answer buttons
    - **Guided exploration**: `onclick="sendPrompt('Show me a more advanced example with edge cases.')"` on a "Go deeper →" button
    - **Comparison**: `onclick="sendPrompt('Compare REST vs GraphQL — when should I use each?')"` on one of two nodes
    
    **Form / preference collector** — gather multiple user selections, then send them all at once. Use local JS to track choices (button highlights, state object) and a submit button that composes a sendPrompt from the collected answers:
    ```html
    <script>
    var choices = {};
    function pick(category, value, btn) {
      choices[category] = value;
      // Highlight selected button, dim siblings
      btn.parentElement.querySelectorAll('button').forEach(function(b) {
        b.classList.toggle('active', b === btn);
      });
    }
    function submitChoices() {
      var parts = [];
      for (var k in choices) parts.push(k + ': ' + choices[k]);
      sendPrompt('Here are my preferences:\n' + parts.join('\n') + '\nGive me a personalized recommendation based on these choices.');
    }
    </script>
    
    <h3>What's your style?</h3>
    <p style="margin:8px 0 4px;">Pace</p>
    <button onclick="pick('pace','relaxed',this)">Relaxed</button>
    <button onclick="pick('pace','moderate',this)">Moderate</button>
    <button onclick="pick('pace','intensive',this)">Intensive</button>
    
    <p style="margin:8px 0 4px;">Focus</p>
    <button onclick="pick('focus','culture',this)">Culture</button>
    <button onclick="pick('focus','nature',this)">Nature</button>
    <button onclick="pick('focus','food',this)">Food</button>
    
    <button onclick="submitChoices()" style="margin-top:12px; font-weight:500;">Get my recommendation →</button>
    ```
    This pattern is powerful because the model receives a structured summary of all user preferences in one message. Use local JS for the selection UI (instant feedback), then sendPrompt only on final submit.
    
    ### When to use sendPrompt vs local JS:
    | User action | Use | Why |
    |------------|-----|-----|
    | Learn more about a component | `sendPrompt` | Model gives a contextual explanation |
    | Explore a stage / drill down | `sendPrompt` | Model can generate a sub-diagram |
    | Submit answers or preferences | `sendPrompt` | Model evaluates or personalizes |
    | Toggle views, adjust sliders | Local JS | Instant feedback, no reasoning needed |
    | Filter/sort data | Local JS | Instant response, no model needed |
    
    
    ## Interactivity by default
    
    Build dashboards, charts, graphs, interactive functions, animated sections, moving objects, explandable detail sections, cards, copyable text elements and more. If the topic allows and it makes sense for the topic, build complex and visually stunning elements.
    
    Visualizations should feel alive and polished — not static images dumped into chat. Build interfaces that invite interaction:
    
    - **Expandable sections** — use collapsible `<details>` elements or JS-toggled sections so users can explore at their own pace without overwhelming them upfront
    - **Hover effects** — nodes, buttons, and cards should respond to hover (the `.node` class adds this for SVG elements; for HTML, use `:hover` styles)
    - **Smooth transitions** — add `transition: all 0.2s ease` to interactive elements for a polished feel
    - **Active states** — when a user selects an option or clicks a tab, make the selection visually clear with the `.active` class or distinct styling
    - **Progressive disclosure** — show a clean overview first, let the user click to reveal detail (tabs, accordions, or sendPrompt for model-powered drill-down)
    
    **The goal is to build something that feels like a real app component embedded in chat with reactivity, sections and extra elements** — not a screenshot. If the visualization has multiple facets, give the user controls to explore them. If it has hierarchical information, let them expand and collapse. If it has data, let them sort or filter.
    
    
    ## openLink bridge — opening URLs from visualizations
    
    `openLink(url)` opens a URL in a new browser tab from within the visualization iframe. Normal `<a href="...">` links inside an iframe can behave unpredictably (opening inside the iframe, being blocked by sandbox restrictions, etc.). This function handles that by opening the link in the parent window instead.
    
    ```html
    <button onclick="openLink('https://docs.example.com/api-reference')">
      Open API docs ↗
    </button>
    ```
    
    Or in SVG:
    ```svg
    <g class="node c-blue" onclick="openLink('https://github.com/org/repo')">
      <rect x="100" y="20" width="200" height="44" rx="8"/>
      <text class="th" x="200" y="42" text-anchor="middle" dominant-baseline="central">View source ↗</text>
    </g>
    ```
    
    Use `openLink` for external references, documentation links, or source code links. Unlike `sendPrompt`, this navigates away from the chat — use it when the user needs to access an external resource, not when they need the model to explain something.
    
    
    ## copyText + toast bridges — feedback on user actions
    
    `copyText(text)` copies `text` to the system clipboard and automatically shows a localized "Copied" toast in the top-right corner of the iframe. Works from HTTPS and HTTP origins (falls back to `execCommand('copy')` if the async Clipboard API is blocked). Use this on "Copy" buttons inside interactive visualizations — data tables, code snippets, shareable values.
    
    ```html
    <button onclick="copyText(JSON.stringify(data, null, 2))">Copy JSON</button>
    ```
    
    `toast(message, kind)` shows a small auto-dismissing banner inside the iframe. `kind` is optional and controls the text color: `'success'` (green, default), `'info'` (blue), `'warn'` (amber), `'error'` (red). Use it for status notifications inside long-running interactive tools — "Calculation done", "Invalid input", etc.
    
    ```html
    <button onclick="recompute(); toast('Recomputed', 'info')">Recompute</button>
    ```
    
    Toasts auto-dismiss after ~2.2 s and stack vertically if fired in quick succession.
    
    
    ## saveState + loadState bridges — persistent interactive state
    
    `saveState(key, value)` and `loadState(key, fallback)` proxy `parent.localStorage` with a key prefix scoped to **this assistant message**. State survives page reloads and tab switches, but two different chats (or different messages in the same chat) each get their own independent state — no cross-contamination.
    
    ```html
    <script>
      // Restore toggle state on load
      var showRaw = loadState('showRaw', false);
      document.getElementById('raw-toggle').checked = showRaw;
      applyView(showRaw);
    
      function onToggleChange(el) {
        saveState('showRaw', el.checked);
        applyView(el.checked);
      }
    </script>
    ```
    
    Use it for: selected tabs, picked chart range, hidden/shown layers, theme overrides, collapsed sections — anything the user would expect to be remembered when they re-open the chat.
    
    Values are JSON-serialized. If `localStorage` is blocked (private browsing, sandboxed), both functions silently no-op and `loadState` returns `fallback`.
    
    
    ## CDN libraries — batteries included
    
    The strict-mode CSP allowlists three major CDN hosts, so the model can load **any library** served from them without touching any plugin setting. Prefer these over self-hosted paths for reliability.
    
    Allowed hosts:
    - `cdnjs.cloudflare.com` — Cloudflare's CDN, widest coverage
    - `cdn.jsdelivr.net` — npm / GitHub-backed, good for minor-version pinning
    - `unpkg.com` — npm mirror, same as jsdelivr
    
    Recommended libraries for visualization work:
    
    | Library | Why reach for it | Example loader |
    |---------|------------------|----------------|
    | **Chart.js** | Bar / line / doughnut / scatter charts with animation out of the box | `<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>` |
    | **D3.js** | Custom data-driven SVG (force graphs, arcs, maps, non-standard charts) | `<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>` |
    | **Vega-Lite** | Declarative grammar of graphics — feed it a JSON spec, it draws the chart | `<script src="https://cdn.jsdelivr.net/npm/vega@5"></script><script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script><script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>` |
    
    Any other library on those three CDNs also works — vis-network, d3-force, echarts, apexcharts, plotly, tone.js, wavesurfer, etc. The host auto-detects completion and executes your `<script>` block once the fence stabilizes.
    
    
    ## Library init — avoid silent failures
    
    Inline scripts run the instant the iframe reconciler inserts them, which is usually BEFORE the browser has finished laying out the elements you just added. Two cases bite:
    
    ### 1 · Chart.js — wrap the canvas in a fixed-height container
    
    Chart.js inherits width from the container and uses `maintainAspectRatio: false` to respect your height. If the canvas is loose inside a flex container with no intrinsic height, the canvas collapses to zero and nothing draws:
    
    ```html
    <div style="position: relative; height: 260px;">
      <canvas id="chart"></canvas>
    </div>
    <script>
      new Chart(document.getElementById('chart').getContext('2d'), {
        type: 'bar',
        data: { /* … */ },
        options: { responsive: true, maintainAspectRatio: false, /* … */ }
      });
    </script>
    ```
    
    ### 2 · Script order
    
    External `<script src="…">` tags and the inline `<script>` that uses them run in **insertion order** (the host forces `async=false` on every dynamically-inserted script). Put external libraries first, your consumer script last:
    
    ```html
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script>/* uses Chart and d3 */</script>
    ```
    
    You do NOT need `DOMContentLoaded` or `window.onload` wrappers — by the time your script runs, the entire fragment (except any later-positioned siblings) is already in the DOM.
    
    
    ## Quick reference
    
    | Rule | Value |
    |------|-------|
    | SVG viewBox width | Always 680px |
    | Font sizes | 14px labels, 12px subtitles |
    | Stroke width | 0.5px for borders |
    | Max colors per diagram | 2–3 ramps |
    | Subtitle max length | 5 words |
    | Corner radius (SVG) | rx=4 default, rx=8 emphasis |
    | Corner radius (HTML) | var(--radius-md) or -lg |
    | Min font size | 11px |
    | Heading sizes | h1=22px, h2=18px, h3=16px |
    
    ## Common failures
    
    1. **Arrow through a box** — trace coordinates against every box
    2. **Text overflow** — check (text_width + 2×padding) fits the rect
    3. **viewBox too small** — content clipped at bottom
    4. **viewBox too large** — creates wasteful empty space below the diagram. Calculate actual content bottom + 40px
    5. **Floating labels** — every text needs a box, legend, or leader line
    6. **Connector without fill="none"** — renders as black shape
    7. **Missing dominant-baseline="central"** — text sits 4px too high
    8. **Missing arrow marker in defs** — always include it
    9. **Hardcoded colors** — always use CSS variables or ramp classes
    10. **Chart.js canvas collapsed to 0 height** — wrap every canvas in `<div style="position: relative; height: Xpx;">` and set `maintainAspectRatio: false`
    11. **Document wrapper tags** — never emit `<!DOCTYPE>`, `<html>`, `<head>`, or `<body>`. The iframe shell already provides these. Including them mangles the DOM and breaks script execution

  sync_to_owui.py: |
    #!/usr/bin/env python3
    """Sync skills/owui/*/SKILL.md to the OWI Postgres database.
    
    Reads every SKILL.md under skills/owui/, strips YAML frontmatter, and upserts
    each skill into the `skill` table. Skips rows whose content hash hasn't changed.
    """
    
    import hashlib
    import json
    import os
    import re
    import sys
    import time
    from pathlib import Path
    
    import psycopg2
    
    DATABASE_URL = os.environ.get("DATABASE_URL")
    if not DATABASE_URL:
        print("ERROR: DATABASE_URL not set", file=sys.stderr)
        sys.exit(1)
    
    # When running from a ConfigMap mount, SKILLS_FLAT_DIR points to a flat
    # directory of *.md files (one per skill). Otherwise fall back to the
    # structured owui/ tree next to this script.
    _flat_dir = os.environ.get("SKILLS_FLAT_DIR")
    if _flat_dir:
        SKILLS_FLAT_DIR = Path(_flat_dir)
        SKILLS_DIR = None
    else:
        SKILLS_FLAT_DIR = None
        SKILLS_DIR = Path(__file__).parent / "owui"
    
    # Admin user ID — owner assigned to created skills
    # Falls back to querying for the first admin user
    ADMIN_USER_ID = os.environ.get("OWUI_ADMIN_USER_ID")
    
    FRONTMATTER_RE = re.compile(r"^---\s*\n(.*?)\n---\s*\n", re.DOTALL)
    
    
    def parse_skill_file(path: Path, skill_id: str | None = None) -> dict | None:
        text = path.read_text()
        m = FRONTMATTER_RE.match(text)
        if not m:
            print(f"  SKIP {path}: no frontmatter", file=sys.stderr)
            return None
    
        body = text[m.end():].strip()
        fm_text = m.group(1)
    
        # Simple key: "value" parser (no full YAML dependency needed)
        meta = {}
        for line in fm_text.splitlines():
            kv = line.split(":", 1)
            if len(kv) == 2:
                key = kv[0].strip()
                val = kv[1].strip().strip('"').strip("'")
                if val.startswith("["):
                    # OWI expects tags as a list, not a string
                    raw = re.sub(r'[\[\]"]', "", val)
                    meta[key] = [v.strip() for v in raw.split(",") if v.strip()]
                else:
                    meta[key] = val
    
        if skill_id is None:
            skill_id = path.parent.name  # directory name = skill slug
        return {
            "id": skill_id,
            "name": meta.get("name", skill_id),
            "description": meta.get("description", ""),
            "content": body,
            "meta": {"tags": meta.get("tags", []), "scope": meta.get("scope", "")},
        }
    
    
    def content_hash(content: str) -> str:
        return hashlib.sha256(content.encode()).hexdigest()
    
    
    def main():
        if SKILLS_FLAT_DIR:
            skill_files = sorted(SKILLS_FLAT_DIR.glob("*.md"))
            flat_mode = True
        else:
            skill_files = sorted(SKILLS_DIR.glob("*/SKILL.md"))
            flat_mode = False
        if not skill_files:
            src = SKILLS_FLAT_DIR or SKILLS_DIR
            print(f"No skill files found under {src}")
            sys.exit(0)
    
        conn = psycopg2.connect(DATABASE_URL)
        cur = conn.cursor()
    
        # Resolve admin user ID if not provided
        admin_user_id = ADMIN_USER_ID
        if not admin_user_id:
            cur.execute("SELECT id FROM \"user\" WHERE role='admin' LIMIT 1")
            row = cur.fetchone()
            if not row:
                print("ERROR: no admin user found in DB", file=sys.stderr)
                sys.exit(1)
            admin_user_id = row[0]
    
        created = updated = skipped = errors = 0
        now = int(time.time())
    
        for path in skill_files:
            sid_override = path.stem if flat_mode else None
            skill = parse_skill_file(path, skill_id=sid_override)
            if skill is None:
                errors += 1
                continue
    
            sid = skill["id"]
            new_hash = content_hash(skill["content"] + skill["name"] + skill["description"] + json.dumps(skill["meta"], sort_keys=True))
    
            # Match by name (unique constraint) — existing skills may have different IDs
            # (created via UI). Use name as the stable lookup key.
            cur.execute("SELECT id, content, description, meta FROM skill WHERE name = %s", (skill["name"],))
            existing = cur.fetchone()
    
            if existing:
                existing_id, existing_content, existing_desc, existing_meta = existing
                existing_meta_norm = json.dumps(existing_meta or {}, sort_keys=True)
                old_hash = content_hash(existing_content + skill["name"] + (existing_desc or "") + existing_meta_norm)
                if old_hash == new_hash:
                    print(f"  SKIP    {existing_id!r} (name={skill['name']!r}, unchanged)")
                    skipped += 1
                    continue
                cur.execute(
                    "UPDATE skill SET description=%s, content=%s, meta=%s, updated_at=%s WHERE id=%s",
                    (skill["description"], skill["content"], json.dumps(skill["meta"]), now, existing_id),
                )
                print(f"  UPDATE  {existing_id!r} (name={skill['name']!r})")
                updated += 1
            else:
                cur.execute(
                    """INSERT INTO skill (id, user_id, name, description, content, meta, is_active, created_at, updated_at)
                       VALUES (%s, %s, %s, %s, %s, %s, true, %s, %s)""",
                    (sid, admin_user_id, skill["name"], skill["description"],
                     skill["content"], json.dumps(skill["meta"]), now, now),
                )
                print(f"  CREATE  {sid!r} (name={skill['name']!r})")
                created += 1
    
        conn.commit()
        conn.close()
    
        print(f"\nDone: created={created} updated={updated} skipped={skipped} errors={errors}")
        if errors:
            sys.exit(1)
    
    
    if __name__ == "__main__":
        main()

